  document.getElementById('magicWandBtn').addEventListener('click', () => setToolMode('magicWand'));
  document.getElementById('lassoBtn').addEventListener('click', () => setToolMode('lasso'));
  document.getElementById('pixelDragBtn').addEventListener('click', () => setToolMode('pixelDrag'));
  document.getElementById('pencilBtn').addEventListener('click', () => setToolMode('pencil'));
  document.getElementById('eraserBtn').addEventListener('click', () => setToolMode('eraser'));

  document.getElementById('wandTolerance').addEventListener('input', function() {
    document.getElementById('wandToleranceValue').textContent = this.value;
  });

  document.getElementById('lassoTolerance').addEventListener('input', function() {
    document.getElementById('lassoToleranceValue').textContent = this.value;
  });

  // === GLOBAL MOUSE / KEYBOARD ===

  window.addEventListener('mousemove', (e) => {
    if (isLassoDrawing) {
      handleBoxSelectMove(e);
    }
  });

  window.addEventListener('mouseup', (e) => {
    if (isDrawing) {
      isDrawing = false;
      if (pixels) { renderBasePalette(); renderExtractedPalette(); scheduleSave(); }
    }
    if (isDraggingPixel) isDraggingPixel = false;
    if (isPanning) isPanning = false;
    if (isLassoDrawing) {
      handleBoxSelectUp(e);
    }
    if (isSelecting) {
      isSelecting = false;
      hideSelectionBox();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
      e.preventDefault();
      performUndo();
    } else if ((e.ctrlKey || e.metaKey) && (e.key === 'Z' || (e.key === 'z' && e.shiftKey))) {
      e.preventDefault();
      performRedo();
    }
  });

  // === BUTTON EVENT LISTENERS ===

  document.getElementById('clearSelectionBtn').addEventListener('click', () => {
    selectionBounds = null;
    wandSelection = null;
    lassoPoints = [];
    isLassoDrawing = false;
    hideSelectionBox();
    clearWandOverlay();
    clearLassoOverlay();
    if (pixels) {
      renderBasePalette();
      renderExtractedPalette();
    }
    updateSaveZoneBtn();
  });

  document.getElementById('undoBtn').addEventListener('click', performUndo);
  document.getElementById('redoBtn').addEventListener('click', performRedo);

  document.getElementById('saveZoneBtn').addEventListener('click', saveSelectionAsZone);

  document.getElementById('colorOpsTabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.color-ops-tab');
    if (!tab) return;
    colorOpsTab = tab.dataset.tab;
    renderColorOps();
  });

  document.getElementById('clearSavedBtn').addEventListener('click', () => {
    if (confirm('Clear saved project data?')) {
      clearSavedProject();
    }
  });

  document.getElementById('paletteHoverCheck').addEventListener('change', function() {
    if (!this.checked) clearSwatchHighlights();
  });

  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const dims = parseInt(document.getElementById('dimsSelectEl').value, 10);
    const maintainAspect = document.getElementById('maintainAspectCheck').checked;
    const msg = maintainAspect ? 'Loading\u2026' : 'Loading & processing ' + dims + '\u00d7' + dims + '\u2026';
    showLoading(msg);
    const img = new Image();
    img.onload = () => {
      loadedImage = img;
      setTimeout(() => {
        try {
          processImage(img);
        } catch (err) {
          hideLoading();
          alert('Error processing image: ' + (err.message || err));
        }
      }, 50);
    };
    img.onerror = () => {
      hideLoading();
      alert('Failed to load image.');
    };
    img.src = URL.createObjectURL(file);
  });

  document.getElementById('maintainAspectCheck').addEventListener('change', () => {
    if (!loadedImage) return;
    showLoading('Reprocessing\u2026');
    setTimeout(() => {
      try {
        processImage(loadedImage);
      } catch (err) {
        hideLoading();
        alert('Error reprocessing: ' + (err.message || err));
      }
    }, 50);
  });

  // === ZOOM ===

  function updateZoomButtonState() {
    if (!pixels) return;
    const zoomOut = document.getElementById('zoomOutBtn');
    const zoomIn = document.getElementById('zoomInBtn');
    const isFullyOut = viewBox.w >= canvasW && viewBox.h >= canvasH;
    const isFullyIn = viewBox.w <= MIN_VIEW && viewBox.h <= MIN_VIEW;
    zoomOut.disabled = isFullyOut;
    zoomIn.disabled = isFullyIn;
    const pct = Math.round((canvasW / viewBox.w) * 100);
    const levelEl = document.getElementById('zoomLevel');
    if (levelEl) levelEl.textContent = pct + '%';
  }
  document.getElementById('zoomOutBtn').addEventListener('click', () => {
    if (!pixels) return;
    zoomBy(1 / ZOOM_FACTOR);
  });
  document.getElementById('zoomInBtn').addEventListener('click', () => {
    if (!pixels) return;
    zoomBy(ZOOM_FACTOR);
  });
  document.getElementById('zoomResetBtn').addEventListener('click', () => {
    if (!pixels) return;
    resetViewBox();
  });

  document.getElementById('dimsSelectEl').addEventListener('change', (e) => {
    if (!loadedImage) return;
    const dims = parseInt(e.target.value, 10);
    const maintainAspect = document.getElementById('maintainAspectCheck').checked;
    const nw = loadedImage.naturalWidth, nh = loadedImage.naturalHeight;
    let nextW = dims, nextH = dims;
    if (maintainAspect && nw > 0 && nh > 0) {
      const aspect = nw / nh;
      if (aspect >= 1) { nextW = dims; nextH = Math.max(1, Math.round(dims / aspect)); }
      else { nextH = dims; nextW = Math.max(1, Math.round(dims * aspect)); }
    }
    if (nextW === canvasW && nextH === canvasH) return;
    showLoading('Reprocessing\u2026');
    setTimeout(() => {
      try {
        processImage(loadedImage);
      } catch (err) {
        hideLoading();
        alert('Error reprocessing: ' + (err.message || err));
      }
    }, 50);
  });

  // === EXPORT ===

  document.getElementById('exportPngBtn').addEventListener('click', () => {
    if (!pixels) return;
    const cleanSvg = buildSvg();
    const canvas = document.createElement('canvas');
    canvas.width = canvasW;
    canvas.height = canvasH;
    const ctx = canvas.getContext('2d');
    const svgData = new XMLSerializer().serializeToString(cleanSvg);
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvasW, canvasH);
      const a = document.createElement('a');
      a.download = 'pixelmagic.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    };
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
  });

  document.getElementById('exportSvgBtn').addEventListener('click', () => {
    if (!pixels) return;
    const cleanSvg = buildSvg();
    const svgData = new XMLSerializer().serializeToString(cleanSvg);
    const a = document.createElement('a');
    a.download = 'pixelmagic.svg';
    a.href = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);
    a.click();
  });

  // === INITIALIZATION ===

  loadFromLocalStorage();
  updateZoomButtonState();
})();
</script>
</body>
</html>
